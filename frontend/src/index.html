<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log Explorer</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="window-frame">
        <header class="topbar">
          <div class="title">
            <span class="logo-dot">
              <i class="bi bi-grid-1x2-fill"></i>
            </span>
            <span>Log Explorer</span>
          </div>

          <div
            class="d-flex align-items-center gap-3 w-100 justify-content-end flex-wrap"
          >
            <!-- <div class="search-box">
            <i class="bi bi-search text-secondary"></i>
            <input id="globalSearch" type="text" placeholder="Search..." />
          </div> -->
            <div class="user-chip" title="admin"></div>
          </div>
        </header>

        <main class="content">
          <section class="panel">
            <div class="panel-title">Filters</div>

            <form id="filterForm" autocomplete="off">
              <div class="row g-2 align-items-end">
                <div class="col-12 col-lg-3">
                  <label class="section-label" for="applicationName"
                    >Application Code</label
                  >
                  <select id="applicationName" class="form-select"></select>
                </div>

                <div class="col-12 col-lg-3">
                  <label class="section-label" for="interfaceName"
                    >Interface Code</label
                  >
                  <select id="interfaceName" class="form-select"></select>
                </div>

                <div class="col-12 col-lg-6">
                  <label class="section-label">Date Range & Recent</label>
                  <div
                    class="d-flex gap-2 align-items-center flex-nowrap date-range-group"
                  >
                    <input
                      id="dateFrom"
                      type="datetime-local"
                      class="form-control date-input"
                    />
                    <i
                      class="bi bi-arrow-right text-secondary flex-shrink-0"
                    ></i>
                    <input
                      id="dateTo"
                      type="datetime-local"
                      class="form-control date-input"
                    />
                    <div class="recent-range-wrap">
                      <select id="recentRange" class="form-select">
                        <option value="">Recent</option>
                        <option value="15">15 mins</option>
                        <option value="60">1 hour</option>
                        <option value="1440">24 hours</option>
                        <option value="10080">7 days</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>

              <div class="row mt-3 g-1 align-items-end">
                <label class="section-label">Search by</label>
                <div
                  class="search-action-container d-flex align-items-center justify-content-between gap-2 flex-nowrap"
                >
                  <div class="d-flex align-items-center flex-grow-1">
                    <div class="input-group search-group">
                      <select id="searchType" class="form-select border-end-0">
                        <option value="transactionId">Transaction ID</option>
                        <option value="loggedMessage">Logged Message</option>
                      </select>
                      <input
                        type="text"
                        id="searchKeyword"
                        class="form-control"
                        placeholder="Search..."
                      />
                    </div>
                  </div>

                  <div class="d-flex align-items-center gap-4">
                    <div
                      id="summaryDisplay"
                      class="d-flex align-items-center gap-4"
                    >
                      <div class="stat-pill success-stat">
                        Success: <span id="successCount">0</span>
                      </div>
                      <div class="stat-pill error-stat">
                        Errors: <span id="errorCount">0</span>
                      </div>
                      <div class="unique-stat">
                        Unique: <span id="uniqueCount">0</span>
                      </div>
                    </div>

                    <div class="btn-group-actions d-flex gap-3">
                      <button
                        id="submitBtn"
                        type="submit"
                        class="btn btn-primary px-3"
                      >
                        <i class="bi bi-search me-2"></i>Submit
                      </button>
                      <button
                        id="clearBtn"
                        type="button"
                        class="btn btn-outline-secondary px-3"
                      >
                        <i class="bi bi-eraser me-2"></i>Clear
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </form>
          </section>

          <ul class="nav nav-tabs mt-3 border-0" id="logTabs" role="tablist">
            <li class="nav-item" role="presentation">
              <button
                class="nav-link active fw-bold"
                id="explorer-tab"
                data-bs-toggle="tab"
                data-type="EXPLORER"
                type="button"
                role="tab"
              >
                Log Explorer
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button
                class="nav-link fw-bold"
                id="duration-tab"
                data-bs-toggle="tab"
                data-type="DURATION"
                type="button"
                role="tab"
              >
                Transaction Durations
              </button>
            </li>
            <li class="nav-item" role="presentation">
              <button
                class="nav-link fw-bold"
                id="third-tab"
                data-bs-toggle="tab"
                data-type="MINMAX"
                type="button"
                role="tab"
              >
                Min Max
              </button>
            </li>
          </ul>

          <section class="table-wrap mt-3">
            <div id="tableLoader" class="table-loader-overlay">
              <div class="loader"></div>
            </div>
            <div class="table-responsive">
              <table
                id="logsTable"
                class="table table-hover align-middle mb-0 w-100"
              >
                <thead></thead>
                <tbody id="logsTableBody"></tbody>
              </table>
            </div>

            <div class="table-bottom">
              <div class="entries" id="entriesText">
                Showing 0-0 of 0 entries
              </div>
              <div class="pager" id="pager"></div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div
            class="modal-header border-0 pb-0 justify-content-between align-items-center"
          >
            <h5 class="modal-title fw-bold">Log Message</h5>
            <div class="d-flex gap-3 align-items-center fs-5">
              <button id="copyBtn" class="btn btn-sm btn-primary">
                <i class="bi bi-clipboard"></i> Copy
              </button>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
          </div>
          <div class="modal-body">
            <div class="detail-container p-3 bg-light rounded">
              <pre
                id="modalContent"
                class="mb-0"
                style="white-space: pre-wrap; word-break: break-all"
              ></pre>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal fade" id="chartModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold">
              Performance Trend:
              <span id="chartInterfaceTitle" class="text-primary"></span>
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="row g-3 mb-4 p-3 bg-light rounded mx-0 align-items-end">
              <div class="col-md-3">
                <label class="form-label small fw-bold">From Time</label>
                <input
                  type="datetime-local"
                  id="chartDateFrom"
                  class="form-control form-control-sm"
                />
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-bold">To Time</label>
                <input
                  type="datetime-local"
                  id="chartDateTo"
                  class="form-control form-control-sm"
                />
              </div>
              <div class="col-md-3">
                <label class="form-label small fw-bold">Interval</label>
                <select id="chartInterval" class="form-select form-select-sm">
                  <option value="10">10 Minutes</option>
                  <option value="30">30 Minutes</option>
                  <option value="60">1 Hour</option>
                </select>
              </div>
              <div class="col-md-3">
                <button
                  id="updateChartBtn"
                  class="btn btn-primary btn-sm w-100"
                >
                  <i class="bi bi-arrow-clockwise"></i> Update Trend
                </button>
              </div>
            </div>

            <div style="height: 400px; width: 100%">
              <canvas id="interfaceChart"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="assets/js/table.js"></script>
    <script src="assets/js/data-fetch.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
