<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log Explorer</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
  <link href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="window-frame">
      <header class="topbar">
        <div class="title">
          <span class="logo-dot">
            <i class="bi bi-grid-1x2-fill"></i>
          </span>
          <span>Log Explorer</span>
        </div>

        <div class="d-flex align-items-center gap-3 w-100 justify-content-end flex-wrap">
          <!-- <div class="search-box">
            <i class="bi bi-search text-secondary"></i>
            <input id="globalSearch" type="text" placeholder="Search..." />
          </div> -->
          <div class="user-chip" title="admin"></div>
        </div>
      </header>

      <main class="content">
        <section class="panel">
          <div class="panel-title">Filters</div>

          <form id="filterForm" autocomplete="off">
            <div class="row g-3 align-items-end">
              <div class="col-12 col-lg-3">
                <label class="section-label" for="applicationName">Application Code</label>
                <select id="applicationName" class="form-select"></select>
              </div>

              <div class="col-12 col-lg-3">
                <label class="section-label" for="interfaceName">Interface Code</label>
                <select id="interfaceName" class="form-select"></select>
              </div>

              <div class="col-12 col-lg-6">
                <label class="section-label">Date Range & Recent</label>
                <div class="d-flex gap-2 align-items-center flex-wrap flex-lg-nowrap">
                  <input id="dateFrom" type="datetime-local" class="form-control" />
                  <i class="bi bi-arrow-right text-secondary"></i>
                  <input id="dateTo" type="datetime-local" class="form-control" />
                  <div style="min-width: 140px;">
                    <select id="recentRange" class="form-select">
                      <option value="">Recent</option>
                      <option value="15">15 mins</option>
                      <option value="60">1 hour</option>
                      <option value="1440">24 hours</option>
                      <option value="10080">7 days</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <div class="row mt-3 g-3 align-items-end">
              <div class="col-12 col-lg-9">
                <label class="section-label">Search</label>
                <div class="input-group">
                  <select id="searchType" class="form-select border-end-0" style="max-width: 180px; border-top-right-radius: 0; border-bottom-right-radius: 0;">
                    <option value="transactionId">Transaction ID</option>
                    <option value="loggedMessage">Logged Message</option>
                  </select>
                  <input id="searchKeyword" type="text" class="form-control" placeholder="Enter data..." style="border-top-left-radius: 0; border-bottom-left-radius: 0;">
                </div>
              </div>

              <div class="col-12 col-lg-3 d-flex justify-content-lg-end gap-2">
                <button type="button" id="submitBtn" class="btn btn-primary w-100">Submit</button>
                <button type="button" id="clearBtn" class="btn btn-outline-secondary w-100">Clear</button>
              </div>
            </div>
          </form>
        </section>

        <section class="table-wrap mt-3">
          <div class="table-responsive">
            <table id="logsTable" class="table table-hover align-middle mb-0 w-100">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>

          <div class="table-bottom">
            <div class="entries" id="entriesText">Showing 0-0 of 0 entries</div>
            <div class="pager" id="pager"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0 justify-content-between align-items-center">
          <h5 class="modal-title fw-bold">Log Message</h5>
          <div class="d-flex gap-3 align-items-center fs-5">
            <button id="copyBtn" class="btn btn-sm btn-primary">
              <i class="bi bi-clipboard"></i> Copy
            </button>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
        </div>
        <div class="modal-body">
          <div class="detail-container p-3 bg-light rounded">
            <pre id="modalContent" class="mb-0" style="white-space: pre-wrap; word-break: break-all;"></pre>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/table.js"></script>
  <script src="assets/js/data-fetch.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
