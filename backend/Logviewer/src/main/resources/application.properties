# -------------------- ACTIVE PROFILE --------------------
spring.profiles.active=dev

# -------------------- COMMON CONFIG --------------------
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# -------------------- JDBC PERFORMANCE / SAFETY --------------------
# Fetch rows from Oracle in batches instead of one-by-one.
spring.jdbc.template.fetch-size=100
# Fail very expensive accidental queries instead of keeping WebLogic threads busy forever.
spring.jdbc.template.query-timeout=120

# Hikari is used by Spring Boot when not deploying with a WebLogic JNDI datasource.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------- ACTUATOR --------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.db.schema=BOVOSB

app.db.table.audit-log=MWTB_INTERFACE_AUDIT_LOG
app.db.table.success-log=VW_IF_AU_SUCCESS_LOG
app.db.table.error-log=MWTB_IF_ERROR_LOG
app.db.table.config-log=MWTM_IF_AUDIT_LOG_CONFIG